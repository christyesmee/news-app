name: Global Intelligence Brief
on:
  schedule:
    # Runs at 7:00 AM Eastern Time (12:00 UTC standard time)
    - cron: '0 12 * * *'
  workflow_dispatch:  # Keep this for manual runs
jobs:
  run-agent:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # Updated to latest version
      - name: Set up Python
        uses: actions/setup-python@v5  # Updated to latest
        with:
          python-version: '3.11'  # Recommended: newer & supported longer
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai  # List exactly what you need
          # Or use requirements.txt if you have one
      - name: Run Script
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python news_analyzer.py  # Make sure filename matches yours