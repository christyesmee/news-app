name: Daily Gemini News

on:
  schedule:
    # 7:00 AM Amsterdam (Winter)
    - cron: '0 6 * * *'
  
  # This adds the manual dropdown menu
  workflow_dispatch:
    inputs:
      agent_selector:
        description: 'Which Agent to run?'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - cos_only
        - market_only
        - science_only

jobs:
  run-agents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # 1. MARKET AGENT (Runs if 'all' OR 'market_only')
      - name: Run Market Agent
        if: ${{ github.event_name == 'schedule' || github.event.inputs.agent_selector == 'all' || github.event.inputs.agent_selector == 'market_only' }}
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python daily_gemini_news.py

      # 2. SCIENCE AGENT (Runs if 'all' OR 'science_only')
      - name: Run Science Agent
        if: ${{ github.event_name == 'schedule' || github.event.inputs.agent_selector == 'all' || github.event.inputs.agent_selector == 'science_only' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python daily_science_papers.py

      # 3. CHIEF OF STAFF AGENT (Runs if 'all' OR 'cos_only')
      - name: Run CoS Agent
        if: ${{ github.event_name == 'schedule' || github.event.inputs.agent_selector == 'all' || github.event.inputs.agent_selector == 'cos_only' }}
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python daily_cos_brief.py