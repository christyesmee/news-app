name: Personalised Daily Brief

# Two triggers:
#   * hourly cron -- each run reads every profile in profiles/ and emails only
#     the ones whose send_hour_utc matches the current UTC hour. This is how
#     users self-configure their delivery time; the schedule never changes.
#   * push touching profiles/*.json -- the intake app commits a profile the
#     moment a user activates (and the tune page when they save changes), so
#     this push-trigger delivers their first / updated brief within minutes
#     instead of making them wait for their scheduled hour.
#
# Caveats to note (fine for a demo, flag for production):
#   * GitHub's scheduled cron can be delayed several minutes under load, so a
#     brief may arrive a little after the top of the hour.
#   * GitHub disables scheduled workflows after 60 days of repo inactivity; a
#     periodic commit (or a paid scheduler) keeps them alive in production.

on:
  schedule:
    - cron: '0 * * * *'   # top of every hour (UTC)

  push:
    branches: [main]
    paths:
      - 'profiles/*.json'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'scheduled'
        type: choice
        options:
          - scheduled     # default: only profiles whose send_hour_utc == current UTC hour
          - force_all     # every active profile, ignore the hour gate
          - only_example  # just the example profile, forced (smoke test)

jobs:
  send-briefs:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to commit the updated sent-history back to the repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the push diff (before..after) works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send briefs (scheduled / manual)
        if: github.event_name != 'push'
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          # Optional: override the model (defaults to gpt-4o-mini)
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          # Optional: enable the signed "Tune my brief" footer link.
          # PROFILE_LINK_SECRET must match the Netlify env var of the same name;
          # TUNE_BASE_URL is the deployed intake site URL.
          PROFILE_LINK_SECRET: ${{ secrets.PROFILE_LINK_SECRET }}
          TUNE_BASE_URL: ${{ secrets.TUNE_BASE_URL }}
        run: |
          case "${{ github.event.inputs.mode }}" in
            force_all)
              python send_brief.py --force ;;
            only_example)
              python send_brief.py --only example --force ;;
            *)
              python send_brief.py ;;
          esac

      - name: Send first brief for changed profiles
        if: github.event_name == 'push'
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          PROFILE_LINK_SECRET: ${{ secrets.PROFILE_LINK_SECRET }}
          TUNE_BASE_URL: ${{ secrets.TUNE_BASE_URL }}
        run: |
          # Detect changed profiles from git, NOT the push event payload: commits
          # created via the GitHub Contents API (how the intake commits profiles)
          # arrive with empty added/modified arrays, so the payload approach
          # silently finds nothing. git diff is authoritative.
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'
          if git rev-parse --verify --quiet "$BEFORE^{commit}" >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- 'profiles/*.json')
          else
            # New branch / unknown before sha: fall back to the tip commit's files.
            CHANGED=$(git show --name-only --pretty=format: "$AFTER" -- 'profiles/*.json')
          fi
          IDS=$(printf '%s\n' "$CHANGED" \
            | sed -n 's#^profiles/\(.*\)\.json$#\1#p' \
            | grep -vx 'example' | sort -u)
          if [ -z "$IDS" ]; then
            echo "No user profiles changed in this push; nothing to send."
            exit 0
          fi
          echo "Changed profiles: $IDS"
          for id in $IDS; do
            echo "=== First/updated brief for '$id' ==="
            python send_brief.py --only "$id" --force
          done

      - name: Persist sent-history
        if: always()
        run: |
          # The engine writes history/<id>.json after each send; commit any
          # changes so tomorrow's run knows what was already delivered. Pushes
          # made with GITHUB_TOKEN do not retrigger workflows, and history/ is
          # not in the push path filter, so there is no trigger loop.
          if [ -n "$(git status --porcelain history/ 2>/dev/null)" ]; then
            git config user.name "news-app-bot"
            git config user.email "actions@users.noreply.github.com"
            git add history/
            git commit -m "chore: update sent-history [skip ci]"
            git pull --rebase --autostash origin main || true
            git push || echo "history push skipped (non-fatal)"
          else
            echo "No sent-history changes."
          fi
