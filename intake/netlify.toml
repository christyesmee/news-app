# Netlify config for the intake app.
#
# Deploy note: set this site's "Base directory" to `intake` in the Netlify UI
# (Site configuration -> Build & deploy). All paths below are relative to that
# base, so the published site is intake/ and the functions live in
# intake/netlify/functions/.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Friendly paths for the functions.
[[redirects]]
  from = "/api/pipeline"
  to = "/.netlify/functions/pipeline"
  status = 200

[[redirects]]
  from = "/api/save-profile"
  to = "/.netlify/functions/save-profile"
  status = 200

[[redirects]]
  from = "/api/get-profile"
  to = "/.netlify/functions/get-profile"
  status = 200

[[redirects]]
  from = "/api/delete-profile"
  to = "/.netlify/functions/delete-profile"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200
