<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Base Reset */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #1a1a1a; 
            line-height: 1.6; 
            max-width: 680px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #f4f4f4;
        }

        /* Container */
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Header */
        .header {
            border-bottom: 2px solid #000;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000;
        }
        .date {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            font-weight: 600;
        }

        /* Headings */
        h2 {
            font-size: 18px;
            color: #2c3e50;
            border-left: 4px solid #2c3e50;
            padding-left: 10px;
            margin-top: 30px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        h3 {
            font-size: 16px;
            margin-bottom: 5px;
            color: #000;
        }

        /* Deep Dive Box (The requested feature) */
        .deep-dive-box {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-left: 4px solid #2980b9; /* Professional Blue Accent */
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .deep-dive-box h3 {
            margin-top: 0;
            color: #2980b9;
        }

        /* News Section Box */
        .section {
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .news-title {
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 5px;
            color: #333;
        }

        /* Links */
        a {
            color: #2980b9;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #999;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Strategic Intelligence Brief</h1>
            <div class="date">{{DATE}}</div>
        </div>
        
        {{CONTENT}}
        
        <div class="footer">
            Generated by Gemini Pro • Automated Strategic Monitor
        </div>
    </div>
</body>
</html>
