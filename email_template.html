<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* MOBILE-FIRST STYLES */
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #333; 
            line-height: 1.6; 
            margin: 0; 
            padding: 0; 
            background-color: #f4f4f4;
            -webkit-text-size-adjust: 100%; /* Prevent font zooming issues */
        }
        
        .container {
            background-color: #ffffff;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px; /* Reduced padding for mobile */
        }

        /* HEADER */
        .header { 
            border-bottom: 3px solid #1a252f; 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
            text-align: center;
        }
        .header h1 { 
            margin: 0; 
            font-size: 24px; /* Slightly smaller for mobile fitting */
            color: #1a252f;
            text-transform: uppercase;
        }
        .date { 
            font-size: 13px; 
            color: #777; 
            margin-top: 5px; 
            font-weight: bold;
        }

        /* SECTION HEADERS */
        h2 { 
            font-size: 20px; 
            color: #2c3e50; 
            border-bottom: 1px solid #ddd;
            padding-bottom: 8px;
            margin-top: 35px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* CARDS / SECTIONS */
        .section { 
            padding: 0;
            margin-bottom: 30px; 
        }
        
        .news-title { 
            font-size: 18px; 
            font-weight: 800; 
            color: #000; 
            margin-bottom: 8px; 
            line-height: 1.3;
        }

        /* DEEP DIVE BOXES */
        .theory-box { 
            background-color: #f8f9fa; 
            border-left: 4px solid #2c3e50; 
            padding: 15px; 
            margin-bottom: 30px;
            border-radius: 4px;
        }
        .theory-title { 
            font-weight: 900; 
            font-size: 14px; 
            color: #2c3e50; 
            text-transform: uppercase; 
            margin-top: 0;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        
        /* TEXT FORMATTING */
        p {
            font-size: 16px; /* Optimized for mobile reading */
            margin-bottom: 12px;
            margin-top: 0;
        }

        a { 
            color: #2980b9; 
            text-decoration: none; 
            font-weight: bold;
        }
        
        /* FOOTER */
        .footer { 
            font-size: 12px; 
            text-align: center; 
            color: #999; 
            margin-top: 40px; 
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        /* MOBILE TWEAKS */
        @media only screen and (max-width: 600px) {
            .container { padding: 15px; width: 100% !important; }
            h1 { font-size: 22px; }
            h2 { font-size: 18px; }
            p { font-size: 16px !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Strategic Brief</h1>
            <div class="date">{{DATE}}</div>
        </div>

        {{CONTENT}}

        <div class="footer">
            Automated Intelligence • Gemini 1.5
        </div>
    </div>
</body>
</html>
