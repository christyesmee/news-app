<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* MODERN MOBILE STYLES */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333; 
            line-height: 1.5; 
            margin: 0; 
            padding: 0; 
            background-color: #f4f4f4;
        }
        
        .container {
            background-color: #ffffff;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* HEADER */
        .header { 
            background: #111;
            color: #fff;
            padding: 20px; 
            margin: -20px -20px 25px -20px; /* Stretch to edges */
            text-align: center;
            border-bottom: 4px solid #00d2ff; /* Tech Blue accent */
        }
        .header h1 { 
            margin: 0; 
            font-size: 22px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .date { 
            font-size: 12px; 
            opacity: 0.8;
            margin-top: 5px; 
        }

        /* IMAGES */
        .story-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 15px;
            object-fit: cover;
            max-height: 250px;
            border: 1px solid #eee;
        }

        /* HEADERS */
        h2 { 
            font-size: 18px; 
            color: #111; 
            border-left: 4px solid #00d2ff;
            padding-left: 10px;
            margin-top: 30px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* CARDS */
        .section { 
            background: #fff;
            padding: 0;
            margin-bottom: 35px; 
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
        
        .news-title { 
            font-size: 18px; 
            font-weight: 800; 
            color: #000; 
            margin-bottom: 10px; 
        }

        /* TEXT */
        p {
            font-size: 15px;
            margin-bottom: 8px;
            margin-top: 0;
            color: #444;
        }
        
        strong { color: #000; }

        a { 
            color: #00d2ff; 
            text-decoration: none; 
            font-weight: bold;
        }
        
        /* FOOTER */
        .footer { 
            font-size: 11px; 
            text-align: center; 
            color: #999; 
            margin-top: 40px; 
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Compute Market Intel</h1>
            <div class="date">{{DATE}}</div>
        </div>

        {{CONTENT}}

        <div class="footer">
            AI Analysis • Gemini 1.5 Pro
        </div>
    </div>
</body>
</html>
