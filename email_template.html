<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333; line-height: 1.6; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #2c3e50; color: #ffffff; padding: 20px; text-align: center; border-radius: 5px 5px 0 0; }
        .header h1 { margin: 0; font-size: 24px; }
        .date { font-size: 14px; opacity: 0.8; margin-top: 5px; }
        .section { background-color: #f9f9f9; padding: 15px; border-left: 5px solid #3498db; margin-bottom: 20px; border-radius: 4px; }
        .news-title { font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 8px; }
        .theory-box { background-color: #fff3cd; border: 1px solid #ffeeba; padding: 12px; font-size: 14px; margin: 15px 0; border-radius: 4px; color: #856404; }
        .footer { font-size: 12px; text-align: center; color: #888; margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; }
        a { color: #3498db; text-decoration: none; font-weight: 500; }
        ul { padding-left: 20px; }
        li { margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌍 Global Intelligence Brief</h1>
        <div class="date">{{DATE}}</div>
    </div>
    <div style="padding: 20px 0;">
        {{CONTENT}}
    </div>
    <div class="footer">
        Automated Analysis by Gemini • Multi-Source Global Monitor<br>
        Building Billionaire-Level Thinking • One Brief Every 2–3 Days
    </div>
</body>
</html>
