<!DOCTYPE html>
<html>
<head>
    <style>
        /* EASY READING STYLES */
        body { 
            font-family: Verdana, sans-serif; /* Very readable font */
            color: #333; 
            line-height: 1.8; /* More space between lines */
            max-width: 700px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #f0f2f5;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* HEADER */
        .header { 
            border-bottom: 4px solid #007bff; 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
            text-align: center;
        }
        .header h1 { 
            margin: 0; 
            font-size: 28px; 
            color: #2c3e50;
        }
        .date { 
            font-size: 14px; 
            color: #777; 
            margin-top: 5px; 
        }

        /* HEADINGS */
        h2 { 
            font-size: 22px; 
            color: #007bff; 
            margin-top: 40px; 
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        /* NEWS SECTION */
        .section { 
            padding: 20px; 
            margin-bottom: 20px; 
            background-color: #ffffff;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
        }
        .news-title { 
            font-size: 18px; 
            font-weight: bold; 
            color: #2c3e50; 
            margin-bottom: 10px; 
        }

        /* LEARNING / THEORY BOX (Flashcard Style) */
        .theory-box { 
            background-color: #fff9db; /* Light Yellow */
            border-left: 5px solid #ffc107; /* Darker Yellow Bar */
            padding: 20px; 
            margin: 25px 0; 
            border-radius: 5px;
        }
        .theory-title { 
            font-weight: 900; 
            font-size: 14px; 
            color: #d39e00; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 10px;
        }
        
        /* LINKS */
        a { 
            color: #007bff; 
            text-decoration: none; 
            font-weight: bold;
        }
        a:hover { text-decoration: underline; }

        /* FOOTER */
        .footer { 
            font-size: 12px; 
            text-align: center; 
            color: #aaa; 
            margin-top: 50px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Global Mentor Brief</h1>
            <div class="date">{{DATE}}</div>
        </div>

        {{CONTENT}}

        <div class="footer">
            Designed for Learning • Powered by Gemini AI
        </div>
    </div>
</body>
</html>
